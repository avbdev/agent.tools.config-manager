name: config-manager-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: config_manager_dev
      POSTGRES_USER: app_rw
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_rw -d config_manager_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass devpassword
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devpassword", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
