name: Build, Push & Deploy to Homelab

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: avbdev/config-manager

jobs:
  preflight:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npx vitest run

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  security-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"
          vuln-type: "os,library"

  gitops-promote:
    name: Promote to Homelab via GitOps
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    steps:
      - name: Checkout homelab GitOps repo
        uses: actions/checkout@v4
        with:
          repository: avbdev/homelab.platform.k8s
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag
        working-directory: gitops/apps/custom/config-manager
        run: |
          kustomize edit set image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Commit and push
        working-directory: gitops
        run: |
          git config user.email "ci@agent.tools"
          git config user.name "Config Manager CI"
          git add apps/custom/config-manager/kustomization.yaml
          git diff --staged --quiet || git commit -m "chore: promote config-manager to ${{ github.sha }}"
          git push
