name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres
      CONFIG_ENCRYPTION_KEY: "ci-test-encryption-key-not-for-prod-use"
      SESSION_SECRET: "ci-test-session-secret-not-for-prod-use"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run preflight:env
      - run: npx prisma validate
      - run: npx prisma generate
      - run: npx prisma migrate diff --from-migrations prisma/migrations --to-schema-datamodel prisma/schema.prisma --shadow-database-url postgresql://postgres:postgres@localhost:5432/postgres --exit-code || true
      - run: npm run lint
      - run: npm run test
      - run: npm run build
